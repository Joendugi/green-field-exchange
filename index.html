<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wakulima | Direct Farm to Table Marketplace</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="description" content="Connect directly with local farmers. Buy fresh organic produce at fair prices without middlemen. Join the sustainable agricultural revolution on Wakulima." />
  <meta name="keywords" content="farmer marketplace, direct farm to table, organic produce, buy local vegetables, sustainable agriculture, farm trade" />
  <meta name="author" content="Wakulima" />

  <!-- Preconnect to external domains for faster loading -->
  <link rel="preconnect" href="https://api.convex.cloud" crossorigin />
  <link rel="dns-prefetch" href="https://api.convex.cloud" />
  <link rel="preconnect" href="https://ktrisnezcdsedqrsiujr.supabase.co" crossorigin />

  <!-- Preload critical fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  </noscript>

  <meta property="og:title" content="Wakulima | The Direct Farmer-to-Buyer Ecosystem" />
  <meta property="og:description" content="Connecting farmers directly with buyers for fresh agricultural products. Fair trade, transparent prices, fresh harvest." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wakulima.online" />
  <meta property="og:image" content="https://wakulima.online/og-image.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Wakulima | Direct Farm Marketplace" />
  <meta name="twitter:description" content="Sustainable farming trade platform connecting local producers with consumers." />
  <meta name="twitter:image" content="https://wakulima.online/twitter-image.jpg" />

  <!-- Structured Data (Schema.org) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wakulima",
      "url": "https://wakulima.online",
      "description": "Connecting local farmers directly with consumers through a transparent agricultural marketplace.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://wakulima.online/marketplace?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Wakulima",
      "url": "https://wakulima.online",
      "logo": "https://wakulima.online/logo.png",
      "sameAs": [
        "https://twitter.com/wakulimafarm",
        "https://facebook.com/wakulima"
      ]
    }
  </script>

  <!-- Critical CSS for initial render (prevents layout shift) -->
  <style>
    html {
      font-family: Inter, system-ui, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    .initial-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #fafafa;
    }

    .initial-loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-color-scheme: dark) {
      .initial-loader {
        background: #1a1a1a;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Initial loader shown until React hydrates -->
    <div class="initial-loader">
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
